on:
  push:
    branches:
      - main
      - rel-1877
      - sta-1877
      - rel-2150
      - sta-2150
  workflow_dispatch:
  # on pr
  pull_request:
    branches:
      - main
      - rel-1877
      - sta-1877
      - rel-2150
      - sta-2150
  schedule:
    - cron: "0 0 * * *"
jobs:
  build:
    uses: gardenlinux/package-build/.github/workflows/build.yml@916cd324baae77b074f783e8acd145c033140a00 # main
    with:
      # publish not on PR
      publish_release: ${{ github.event_name != 'pull_request' }}
      release: false
      arch: '["amd64"]'
